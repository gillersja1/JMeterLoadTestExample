name: JMeter Load Test

on:
  workflow_dispatch:
    inputs:
      threads:
        description: 'Number of concurrent virtual users'
        required: false
        default: '20'
      rampup:
        description: 'Ramp-up period in seconds'
        required: false
        default: '10'
      loops:
        description: 'Loop count per user'
        required: false
        default: '5'
  push:
    branches: [main]
    paths:
      - 'test-plans/**'
      - '.github/workflows/load-test.yml'

env:
  JMETER_VERSION: 5.6.3

jobs:
  load-test:
    name: Run JMeter Load Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: apache-jmeter-${{ env.JMETER_VERSION }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Download JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${JMETER_VERSION}.tgz"
          tar -xzf "apache-jmeter-${JMETER_VERSION}.tgz"

      - name: Run load test
        run: |
          mkdir -p results reports
          ./apache-jmeter-${JMETER_VERSION}/bin/jmeter -n \
            -t test-plans/reqres-api-load-test.jmx \
            -l results/results.jtl \
            -e -o reports/html-report \
            -Jthreads="${{ github.event.inputs.threads || '20' }}" \
            -Jrampup="${{ github.event.inputs.rampup || '10' }}" \
            -Jloops="${{ github.event.inputs.loops || '5' }}"

      - name: Upload raw results (.jtl)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-results
          path: results/

      - name: Upload HTML dashboard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-report
          path: reports/html-report
